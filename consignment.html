<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Jewelry — ระบบฝากขาย</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#8A6D2F;--gold-bg:#FBF7EE;--bg:#FAFAFA;--surface:#FFF;--border:rgba(0,0,0,.08);--t1:#1A1A1A;--t2:#6B6B6B;--t3:#ABABAB;--red:#C0271E;--green:#2d7a50;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px}
.nav{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#2B1A0E,#3E2A1A 55%,#4A3220);border-bottom:1px solid rgba(201,168,76,.35);height:60px;padding:0 22px;display:flex;align-items:center;gap:14px}
.nav-brand{color:var(--gold);font-weight:700;font-size:16px;letter-spacing:1.5px;white-space:nowrap}
.nav-sub{font-size:10px;color:rgba(255,255,255,.4);font-weight:400;display:block}
.nav a.nav-link{color:rgba(255,255,255,.65);font-size:13px;text-decoration:none;padding:6px 12px;border:1px solid rgba(255,255,255,.15);border-radius:8px}
.nav a.nav-link:hover{color:var(--gold-l);border-color:rgba(201,168,76,.5)}
.nav .spacer{flex:1}
.btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;transition:opacity .2s;letter-spacing:.3px}
.btn:hover{opacity:.88}
.btn-gold{background:var(--gold);color:#111}
.btn-dark{background:#333;color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{border:1px solid var(--border);color:var(--t2);background:var(--surface)}
.btn:disabled{opacity:.45;cursor:not-allowed}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:18px;text-align:center;padding:20px}
#login-screen h1{font-size:22px;color:var(--gold-d)}
#login-screen p{color:var(--t2);font-size:14px}
.wrap{max-width:1250px;margin:0 auto;padding:22px 22px 80px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.panel h2{font-size:16px;font-weight:700;color:var(--gold-d);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.form-col{flex:1;min-width:220px}
label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px}
input[type=text],textarea,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:9px;outline:none;background:#fff}
input[type=text]:focus,textarea:focus{border-color:var(--gold)}
textarea{min-height:84px;resize:vertical}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--gold-bg);color:var(--gold-d);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:8px 9px;text-align:left;border-bottom:1px solid rgba(201,168,76,.3);white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--gold-bg)}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:5px}
.tag-ok{background:rgba(92,186,125,.13);color:var(--green)}
.tag-warn{background:rgba(230,160,30,.15);color:#9a6b00}
.tag-err{background:rgba(192,39,30,.1);color:var(--red)}
.thumb{width:44px;height:44px;object-fit:cover;border-radius:7px;border:1px solid var(--border);background:var(--gold-bg)}
.shop-head{display:flex;align-items:center;gap:10px;margin:18px 0 8px;flex-wrap:wrap}
.shop-head h3{font-size:15px;color:var(--t1)}
.shop-head .cnt{font-size:12px;color:var(--t3)}
.muted{color:var(--t3);font-size:13px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;z-index:999;display:none;max-width:90vw}
#toast.err{background:var(--red)}
#toast.ok{background:var(--green)}
.tbl-wrap{overflow-x:auto}
.summary-chip{background:var(--gold-bg);border:1px solid rgba(201,168,76,.3);border-radius:9px;padding:8px 14px;font-size:13px;color:var(--gold-d);font-weight:600}
@media(max-width:600px){.nav{padding:0 12px;gap:8px}.wrap{padding:14px 12px 60px}.panel{padding:14px}}
</style>
</head>
<body>

<div id="login-screen">
  <h1>💎 JS Jewelry — ระบบฝากขาย</h1>
  <p>เข้าสู่ระบบด้วย Google Account เพื่อจัดการสินค้าฝากขาย</p>
  <button class="btn btn-gold" onclick="signIn()">เข้าสู่ระบบด้วย Google</button>
</div>

<div id="app-screen" style="display:none">
<header class="nav">
  <span class="nav-brand">💎 JS Jewelry<span class="nav-sub">ระบบฝากขาย · CONSIGNMENT</span></span>
  <span class="spacer"></span>
  <a class="nav-link" href="index.html">🏠 Admin</a>
  <button class="btn btn-dark" onclick="signOut()">ออกจากระบบ</button>
</header>
<main class="wrap">

  <!-- ═══ ส่งฝากขาย ═══ -->
  <div class="panel">
    <h2>📤 ส่งสินค้าไปฝากขาย</h2>
    <div class="form-row">
      <div class="form-col">
        <label>ชื่อร้านที่ฝากขาย *</label>
        <input type="text" id="shop-name" list="shop-list" placeholder="เช่น ร้านป้าแดง ตลาดพลอย">
        <datalist id="shop-list"></datalist>
      </div>
      <div class="form-col" style="flex:2">
        <label>รหัสสินค้า — บรรทัดละรหัส ใส่จำนวนได้ เช่น "SR0010 x2" (ไม่ใส่จำนวน = ฝากทั้งหมดที่เหลือหน้าร้าน)</label>
        <textarea id="sku-input" placeholder="SR0010 x2placeholder="SR0010, SR0024&#10;SE0005 SE0012"#10;SR0024placeholder="SR0010, SR0024&#10;SE0005 SE0012"#10;SE0005 x1"></textarea>
      </div>
    </div>
    <button class="btn btn-gold" onclick="previewConsign()">🔍 ตรวจสอบรายการ</button>
    <div id="preview-area" style="margin-top:14px"></div>
  </div>

  <!-- ═══ รายการฝากขาย ═══ -->
  <div class="panel">
    <h2>📋 รายการฝากขายปัจจุบัน</h2>
    <div class="toolbar">
      <select id="filter-shop" style="width:auto;min-width:170px" onchange="renderList()"></select>
      <button class="btn btn-outline" onclick="reloadAll()">🔄 โหลดใหม่</button>
      <span class="spacer" style="flex:1"></span>
      <button class="btn btn-red" id="btn-return" onclick="returnSelected()" disabled>↩ รับคืนที่เลือก</button>
      <button class="btn btn-outline" onclick="exportPDF()">📄 รายงาน PDF</button>
      <button class="btn btn-green" onclick="exportExcel()">📊 รายงาน Excel</button>
    </div>
    <div id="consign-list"><p class="muted">กำลังโหลด…</p></div>
  </div>

</main>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script>
/* ═══ CONFIG ═══ */
const CONFIG = {
  CLIENT_ID: '725893335045-4mhpfppohrm2tg7guaq3c1q7no3dlaki.apps.googleusercontent.com',
  SHEET_ID:  '1Tk53rhDhYRxTkGpXvbd55hMYlTJ83stwG0H3yoZrMDo',
  SHEET:     'Products',
  LEDGER:    'Consignments',
  SALES:     'Sales',
  SCOPES:    'https://www.googleapis.com/auth/spreadsheets',
  IMG_PROXY: 'https://jsjewelry.pages.dev/img/'
};
const COL = { sku:1,name:2,category:3,material:4,weight:5,gemType:6,gemWeight:7,costPrice:8,sellPrice:9,stock:10,status:11,imageUrl:12,notes:13,promoPrice:19,consignW:22 };

/* ═══ AUTH ═══ */
let tokenClient=null, accessToken=null, gapiReady=false, gisReady=false;
function gapiLoaded(){ gapi.load('client', async ()=>{ await gapi.client.init({}); await gapi.client.load('https://sheets.googleapis.com/$discovery/rest?version=v4'); gapiReady=true; maybeRender(); }); }
function gisLoaded(){ tokenClient = google.accounts.oauth2.initTokenClient({ client_id:CONFIG.CLIENT_ID, scope:CONFIG.SCOPES, callback:handleToken }); gisReady=true; maybeRender(); }
function maybeRender(){
  if(!(gapiReady&&gisReady)) return;
  const saved = sessionStorage.getItem('gapi_token');
  if(saved){ try{ const t=JSON.parse(saved); if(t.expires_at>Date.now()){ accessToken=t.access_token; gapi.client.setToken({access_token:accessToken}); showApp(); return; } }catch(e){} }
  showLogin();
}
function handleToken(resp){
  if(resp.error){ toast('เข้าสู่ระบบไม่สำเร็จ: '+resp.error,'err'); return; }
  accessToken=resp.access_token;
  gapi.client.setToken({access_token:accessToken});
  sessionStorage.setItem('gapi_token', JSON.stringify({access_token:accessToken, expires_at:Date.now()+(resp.expires_in-60)*1000}));
  showApp();
}
function signIn(){ if(tokenClient) tokenClient.requestAccessToken({prompt:''}); }
function signOut(){ if(accessToken){ google.accounts.oauth2.revoke(accessToken); accessToken=null; } gapi.client.setToken(null); sessionStorage.removeItem('gapi_token'); showLogin(); }
function showApp(){ document.getElementById('login-screen').style.display='none'; document.getElementById('app-screen').style.display='block'; reloadAll(); }
function showLogin(){ document.getElementById('login-screen').style.display='flex'; document.getElementById('app-screen').style.display='none'; }

/* ═══ HELPERS ═══ */
function toast(msg,type){ const el=document.getElementById('toast'); el.textContent=msg; el.className=type||''; el.style.display='block'; clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none', 4500); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtN(n){ return n||n===0 ? Number(n).toLocaleString('th-TH') : ''; }
function getImgId(url){ if(!url) return ''; let m;
  if((m=String(url).match(/\/d\/([a-zA-Z0-9_-]{10,})/))) return m[1];
  if((m=String(url).match(/[?&]id=([a-zA-Z0-9_-]{10,})/))) return m[1];
  return ''; }
function imgSrc(url){ const id=getImgId(url); return id ? CONFIG.IMG_PROXY+id : url; }
function nowTH(){ return new Date().toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}); }
function todayTH(){ return new Date().toLocaleDateString('th-TH',{year:'numeric',month:'2-digit',day:'2-digit'}); }
function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ═══ DATA ═══ */
let products = [];   // {row, sku, ..., stock, consignW}
let ledger   = [];   // {row, sku, shop, qty, date, note}
let prodBySku = {};

async function loadProducts(){
  const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.SHEET+'!A:W' });
  const rows = resp.result.values || [];
  products = rows.slice(1).map((r,i)=>({
    row:i+2,
    sku:(r[COL.sku]||'').trim(), name:r[COL.name]||'', category:r[COL.category]||'',
    material:r[COL.material]||'', weight:r[COL.weight]||'', gemType:r[COL.gemType]||'', gemWeight:r[COL.gemWeight]||'',
    costPrice:Number(r[COL.costPrice]||0), sellPrice:Number(r[COL.sellPrice]||0), promoPrice:Number(r[COL.promoPrice]||0),
    notes:r[COL.notes]||'', stock:Number(r[COL.stock]||0), status:r[COL.status]||'',
    imageUrl:r[COL.imageUrl]||'', consignW:(r[COL.consignW]||'').trim()
  })).filter(p=>p.sku);
  prodBySku = {};
  products.forEach(p=>{ prodBySku[p.sku.toLowerCase()] = p; });
}

async function ensureLedgerTab(){
  try{
    await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.LEDGER+'!A1:E1' });
  }catch(e){
    await gapi.client.sheets.spreadsheets.batchUpdate({ spreadsheetId:CONFIG.SHEET_ID,
      resource:{ requests:[{ addSheet:{ properties:{ title:CONFIG.LEDGER } } }] } });
  }
  const h = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.LEDGER+'!A1:E1' });
  if(!h.result.values || !h.result.values[0] || h.result.values[0][0]!=='sku'){
    await gapi.client.sheets.spreadsheets.values.update({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.LEDGER+'!A1:E1',
      valueInputOption:'RAW', resource:{ values:[['sku','shop','qty','dateOut','note']] } });
  }
}

async function loadLedger(){
  const resp = await gapi.client.sheets.spreadsheets.values.get({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.LEDGER+'!A:E' });
  const rows = resp.result.values || [];
  ledger = rows.slice(1).map((r,i)=>({
    row:i+2, sku:(r[0]||'').trim(), shop:(r[1]||'').trim(), qty:Number(r[2]||0), date:r[3]||'', note:r[4]||''
  })).filter(x=>x.sku && x.shop);
}
function activeLedger(){ return ledger.filter(x=>x.qty>0); }
function consignedOf(sku){ return activeLedger().filter(x=>x.sku.toLowerCase()===sku.toLowerCase()).reduce((a,x)=>a+x.qty,0); }
function availOf(p){ return Math.max(0, p.stock - consignedOf(p.sku)); }
function shopNames(){ return [...new Set(activeLedger().map(x=>x.shop))].sort(); }

/* ═══ MIGRATE ข้อมูลจากคอลัมน์ W เดิม ═══ */
async function migrateW(){
  const olds = products.filter(p=>p.consignW);
  if(!olds.length) return;
  toast('กำลังย้ายข้อมูลฝากขายเดิม '+olds.length+' รายการเข้าระบบใหม่…');
  const newRows = [];
  olds.forEach(p=>{
    const dup = ledger.find(x=>x.sku.toLowerCase()===p.sku.toLowerCase() && x.shop===p.consignW);
    if(!dup) newRows.push([p.sku, p.consignW, p.stock||1, todayTH(), 'ย้ายจากระบบเดิม (ฝากทั้งหมด)']);
  });
  if(newRows.length){
    await gapi.client.sheets.spreadsheets.values.append({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.LEDGER+'!A:A',
      valueInputOption:'RAW', insertDataOption:'INSERT_ROWS', resource:{ values:newRows } });
  }
  await gapi.client.sheets.spreadsheets.values.clear({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.SHEET+'!W2:W100000' });
  toast('✅ ย้ายข้อมูลฝากขายเดิม '+newRows.length+' รายการเรียบร้อย','ok');
}

async function reloadAll(){
  try{
    document.getElementById('consign-list').innerHTML='<p class="muted">กำลังโหลด…</p>';
    await ensureLedgerTab();
    await Promise.all([loadProducts(), loadLedger()]);
    if(products.some(p=>p.consignW)){ await migrateW(); await Promise.all([loadProducts(), loadLedger()]); }
    buildShopUI(); renderList();
  }catch(e){ console.error(e); toast('โหลดข้อมูลไม่สำเร็จ: '+(e.result?.error?.message||e.message||e),'err'); }
}
function buildShopUI(){
  const shops = shopNames();
  document.getElementById('shop-list').innerHTML = shops.map(s=>`<option value="${esc(s)}">`).join('');
  const sel = document.getElementById('filter-shop');
  const cur = sel.value || 'all';
  const totalQty = activeLedger().reduce((a,x)=>a+x.qty,0);
  sel.innerHTML = `<option value="all">🏪 ทุกร้าน (${totalQty} ชิ้น)</option>` + shops.map(s=>{
    const q = activeLedger().filter(x=>x.shop===s).reduce((a,x)=>a+x.qty,0);
    return `<option value="${esc(s)}">${esc(s)} (${q} ชิ้น)</option>`;
  }).join('');
  sel.value = shops.includes(cur)||cur==='all' ? cur : 'all';
}

/* ═══ ส่งฝากขาย ═══ */
let previewItems = []; // {p, qty}
function previewConsign(){
  const shop = document.getElementById('shop-name').value.trim();
  const raw  = document.getElementById('sku-input').value.trim();
  const area = document.getElementById('preview-area');
  previewItems = [];
  if(!shop || !raw){ area.innerHTML='<p class="muted">⚠️ กรอกชื่อร้านและรหัสสินค้าก่อนค่ะ</p>'; return; }
  const lines = raw.split(/[\n,;]+/).map(x=>x.trim()).filter(Boolean);
  const seen = {};
  const rows = lines.map(line=>{
    const m = line.split(/[\s×xX*]+/).filter(Boolean);
    const sku = (m[0]||'').trim();
    const reqQty = m[1] ? parseInt(m[1]) : null;
    if(seen[sku.toLowerCase()]) return {sku, st:'err', msg:'รหัสซ้ำในรายการ'};
    seen[sku.toLowerCase()] = 1;
    const p = prodBySku[sku.toLowerCase()];
    if(!p) return {sku, st:'err', msg:'ไม่พบในระบบ'};
    const avail = availOf(p);
    if(avail<=0) return {sku:p.sku, p, st:'err', msg:'ไม่เหลือหน้าร้าน (สต็อก '+p.stock+' ฝากครบแล้ว)'};
    const q = reqQty===null ? avail : reqQty;
    if(q<1 || isNaN(q)) return {sku:p.sku, p, st:'err', msg:'จำนวนไม่ถูกต้อง'};
    if(q>avail) return {sku:p.sku, p, st:'warn', msg:'ขอฝาก '+q+' แต่เหลือหน้าร้าน '+avail};
    previewItems.push({p, qty:q});
    return {sku:p.sku, p, st:'ok', qty:q, avail, msg:'ฝาก '+q+' / เหลือหน้าร้าน '+avail};
  });
  const tagCls = {ok:'tag-ok', warn:'tag-warn', err:'tag-err'};
  area.innerHTML = `
    <div class="tbl-wrap"><table>
      <tr><th>SKU</th><th>รูป</th><th>ชื่อสินค้า</th><th>สต็อกรวม</th><th>ฝากอยู่</th><th>เหลือหน้าร้าน</th><th>จำนวนที่จะฝาก</th><th>ผลตรวจ</th></tr>
      ${rows.map(r=>`<tr>
        <td><b>${esc(r.sku)}</b></td>
        <td>${r.p&&r.p.imageUrl?`<img class="thumb" src="${esc(imgSrc(r.p.imageUrl))}" loading="lazy" onerror="this.style.display='none'">`:'—'}</td>
        <td>${r.p?esc(r.p.name):'—'}</td>
        <td>${r.p?r.p.stock:'—'}</td>
        <td>${r.p?consignedOf(r.p.sku):'—'}</td>
        <td>${r.p?availOf(r.p):'—'}</td>
        <td>${r.st==='ok'?('<b>'+r.qty+'</b>'):'—'}</td>
        <td><span class="tag ${tagCls[r.st]}">${esc(r.msg)}</span></td>
      </tr>`).join('')}
    </table></div>
    <div style="margin-top:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span class="summary-chip">✅ ส่งฝากได้ ${previewItems.length} รายการ รวม ${previewItems.reduce((a,x)=>a+x.qty,0)} ชิ้น → ร้าน "${esc(shop)}"</span>
      <button class="btn btn-green" onclick="confirmConsign()" ${previewItems.length?'':'disabled'}>✔ ยืนยันส่งฝากขาย</button>
    </div>
    <p class="muted" style="margin-top:8px">สินค้าที่ยังเหลือหน้าร้าน ≥ 1 ชิ้น จะยังโชว์บน catalog ตามปกติ · ฝากครบทุกชิ้นเมื่อไหร่ระบบซ่อนให้อัตโนมัติ</p>`;
}
async function confirmConsign(){
  const shop = document.getElementById('shop-name').value.trim();
  if(!shop || !previewItems.length) return;
  try{
    toast('กำลังบันทึก…');
    const updates = [], appends = [];
    previewItems.forEach(it=>{
      const ex = ledger.find(x=>x.sku.toLowerCase()===it.p.sku.toLowerCase() && x.shop===shop);
      if(ex) updates.push({range:`${CONFIG.LEDGER}!C${ex.row}`, values:[[ex.qty + it.qty]]});
      else appends.push([it.p.sku, shop, it.qty, todayTH(), '']);
    });
    if(updates.length) await gapi.client.sheets.spreadsheets.values.batchUpdate({ spreadsheetId:CONFIG.SHEET_ID,
      resource:{ valueInputOption:'RAW', data:updates } });
    if(appends.length) await gapi.client.sheets.spreadsheets.values.append({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.LEDGER+'!A:A',
      valueInputOption:'RAW', insertDataOption:'INSERT_ROWS', resource:{ values:appends } });
    toast(`✅ ส่งฝากขาย ${previewItems.length} รายการ → "${shop}" เรียบร้อย`,'ok');
    document.getElementById('preview-area').innerHTML='';
    document.getElementById('sku-input').value='';
    previewItems=[];
    await reloadAll();
  }catch(e){ console.error(e); toast('บันทึกไม่สำเร็จ: '+(e.result?.error?.message||e.message||e),'err'); }
}

/* ═══ รายการฝากขาย ═══ */
function renderList(){
  const shop = document.getElementById('filter-shop').value || 'all';
  const list = activeLedger().filter(x=>shop==='all'||x.shop===shop);
  const el = document.getElementById('consign-list');
  if(!list.length){ el.innerHTML='<p class="muted">— ยังไม่มีสินค้าฝากขาย —</p>'; updateReturnBtn(); return; }
  const groups = {};
  list.forEach(x=>{ (groups[x.shop]=groups[x.shop]||[]).push(x); });
  el.innerHTML = Object.keys(groups).sort().map(s=>{
    const items = groups[s];
    const totalQty = items.reduce((a,x)=>a+x.qty,0);
    const totalVal = items.reduce((a,x)=>{ const p=prodBySku[x.sku.toLowerCase()]; if(!p) return a;
      const price = p.promoPrice>0&&p.promoPrice<p.sellPrice?p.promoPrice:p.sellPrice; return a+price*x.qty; },0);
    return `
    <div class="shop-head">
      <h3>🏪 ${esc(s)}</h3><span class="cnt">${items.length} รายการ · ${totalQty} ชิ้น · มูลค่ารวม ฿${fmtN(totalVal)}</span>
      <label style="margin:0;font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer">
        <input type="checkbox" onchange="toggleShop(this,'${esc(s).replace(/'/g,"\\'")}')"> เลือกทั้งร้าน</label>
    </div>
    <div class="tbl-wrap"><table>
      <tr><th></th><th>SKU</th><th>รูป</th><th>ชื่อสินค้า</th><th>ฝากอยู่</th><th>สต็อกรวม</th><th>เหลือหน้าร้าน</th><th>ราคา</th><th>ส่งฝากเมื่อ</th><th>จัดการ</th></tr>
      ${items.map(x=>{ const p=prodBySku[x.sku.toLowerCase()]||{};
        return `<tr>
        <td><input type="checkbox" class="ret-chk" data-row="${x.row}" data-shop="${esc(x.shop)}" onchange="updateReturnBtn()"></td>
        <td><b>${esc(x.sku)}</b></td>
        <td>${p.imageUrl?`<img class="thumb" src="${esc(imgSrc(p.imageUrl))}" loading="lazy" onerror="this.style.display='none'">`:'—'}</td>
        <td>${esc(p.name||'(ไม่พบในชีต)')}</td>
        <td><b>${x.qty}</b></td>
        <td>${p.stock!=null?p.stock:'—'}</td>
        <td>${p.sku?availOf(p):'—'}</td>
        <td>฿${fmtN(p.sellPrice||0)}</td>
        <td style="font-size:12px;color:var(--t3)">${esc(x.date)}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-outline" style="padding:5px 10px" onclick="returnQty(${x.row})">↩ คืน</button>
          <button class="btn btn-green" style="padding:5px 10px" onclick="sellQty(${x.row})">💰 ขาย</button>
        </td>
      </tr>`; }).join('')}
    </table></div>`;
  }).join('');
  updateReturnBtn();
}
function toggleShop(cb, shop){
  document.querySelectorAll('.ret-chk').forEach(c=>{ if(c.dataset.shop===shop) c.checked=cb.checked; });
  updateReturnBtn();
}
function updateReturnBtn(){
  const n = document.querySelectorAll('.ret-chk:checked').length;
  const b = document.getElementById('btn-return');
  b.disabled = !n;
  b.textContent = n ? `↩ รับคืนที่เลือก (${n})` : '↩ รับคืนที่เลือก';
}

/* ═══ รับคืน / ขายจากร้านฝาก ═══ */
function ledgerByRow(row){ return ledger.find(x=>x.row===row); }

async function setLedgerQty(entry, newQty, noteSuffix){
  const data = [{range:`${CONFIG.LEDGER}!C${entry.row}`, values:[[newQty]]}];
  if(newQty<=0) data.push({range:`${CONFIG.LEDGER}!E${entry.row}`, values:[[((entry.note||'')+' '+(noteSuffix||'')).trim()]]});
  await gapi.client.sheets.spreadsheets.values.batchUpdate({ spreadsheetId:CONFIG.SHEET_ID,
    resource:{ valueInputOption:'RAW', data } });
}

async function returnQty(row){
  const x = ledgerByRow(row); if(!x) return;
  const ans = prompt(`รับคืน ${x.sku} จากร้าน "${x.shop}"\nฝากอยู่ ${x.qty} ชิ้น — คืนกี่ชิ้น?`, x.qty);
  if(ans===null) return;
  const n = parseInt(ans);
  if(isNaN(n)||n<1||n>x.qty){ toast('จำนวนไม่ถูกต้อง (1–'+x.qty+')','err'); return; }
  try{
    toast('กำลังบันทึก…');
    await setLedgerQty(x, x.qty-n, 'คืนครบ '+todayTH());
    toast(`✅ รับคืน ${x.sku} × ${n} จาก "${x.shop}" เรียบร้อย`,'ok');
    await reloadAll();
  }catch(e){ console.error(e); toast('บันทึกไม่สำเร็จ: '+(e.result?.error?.message||e.message||e),'err'); }
}

async function returnSelected(){
  const rows = [...document.querySelectorAll('.ret-chk:checked')].map(c=>Number(c.dataset.row));
  if(!rows.length) return;
  const entries = rows.map(ledgerByRow).filter(Boolean);
  const totalQty = entries.reduce((a,x)=>a+x.qty,0);
  if(!confirm(`ยืนยันรับคืน ${entries.length} รายการ (${totalQty} ชิ้น) กลับเข้าร้าน?\n(คืนทั้งจำนวนที่ฝากของแต่ละรายการ)`)) return;
  try{
    toast('กำลังบันทึก…');
    const data = [];
    entries.forEach(x=>{
      data.push({range:`${CONFIG.LEDGER}!C${x.row}`, values:[[0]]});
      data.push({range:`${CONFIG.LEDGER}!E${x.row}`, values:[[((x.note||'')+' คืนครบ '+todayTH()).trim()]]});
    });
    await gapi.client.sheets.spreadsheets.values.batchUpdate({ spreadsheetId:CONFIG.SHEET_ID,
      resource:{ valueInputOption:'RAW', data } });
    toast(`✅ รับคืน ${entries.length} รายการเรียบร้อย`,'ok');
    await reloadAll();
  }catch(e){ console.error(e); toast('บันทึกไม่สำเร็จ: '+(e.result?.error?.message||e.message||e),'err'); }
}

async function sellQty(row){
  const x = ledgerByRow(row); if(!x) return;
  const p = prodBySku[x.sku.toLowerCase()];
  if(!p){ toast('ไม่พบสินค้าในชีต Products','err'); return; }
  const ansN = prompt(`💰 ขาย ${x.sku} จากร้าน "${x.shop}"\nฝากอยู่ ${x.qty} ชิ้น — ขายกี่ชิ้น?`, '1');
  if(ansN===null) return;
  const n = parseInt(ansN);
  if(isNaN(n)||n<1||n>x.qty){ toast('จำนวนไม่ถูกต้อง (1–'+x.qty+')','err'); return; }
  const defPrice = (p.promoPrice>0&&p.promoPrice<p.sellPrice?p.promoPrice:p.sellPrice)*n;
  const ansP = prompt(`ราคาขายรวมของ ${n} ชิ้น (บาท)?`, defPrice);
  if(ansP===null) return;
  const total = Number(String(ansP).replace(/,/g,''));
  if(isNaN(total)||total<0){ toast('ราคาไม่ถูกต้อง','err'); return; }
  try{
    toast('กำลังบันทึกการขาย…');
    // 1) ลดยอดฝาก
    await setLedgerQty(x, x.qty-n, 'ขายครบ '+todayTH());
    // 2) ตัดสต็อกรวมใน Products
    const newStock = Math.max(0, p.stock-n);
    const status = newStock<=0 ? 'หมดสต็อก' : 'พร้อมขาย';
    await gapi.client.sheets.spreadsheets.values.update({ spreadsheetId:CONFIG.SHEET_ID,
      range:`${CONFIG.SHEET}!K${p.row}:L${p.row}`, valueInputOption:'USER_ENTERED',
      resource:{ values:[[newStock, status]] } });
    // 3) บันทึกลง Sales
    const cost = (p.costPrice||0)*n;
    await gapi.client.sheets.spreadsheets.values.append({ spreadsheetId:CONFIG.SHEET_ID, range:CONFIG.SALES+'!A:A',
      valueInputOption:'USER_ENTERED', insertDataOption:'INSERT_ROWS',
      resource:{ values:[[genId(), todayTH(), p.sku, p.name+' (ฝากขาย: '+x.shop+')', n, total, cost, total-cost]] } });
    toast(`✅ ขาย ${x.sku} × ${n} = ฿${fmtN(total)} (ร้าน ${x.shop}) — ตัดสต็อก+ลงบันทึกขายแล้ว`,'ok');
    await reloadAll();
  }catch(e){ console.error(e); toast('บันทึกไม่สำเร็จ: '+(e.result?.error?.message||e.message||e),'err'); }
}

/* ═══ รายงาน ═══ */
const REPORT_COLS = ['sku','picture','name','category','material','weight','gemType','gemWeight','sellPrice','promotionPrice','notes','qtyConsigned','shop','dateOut','status'];
function reportItems(){
  const shop = document.getElementById('filter-shop').value || 'all';
  return activeLedger().filter(x=>shop==='all'||x.shop===shop).map(x=>{
    const p = prodBySku[x.sku.toLowerCase()] || {};
    return { ...x, p };
  });
}
function reportTitle(){
  const shop = document.getElementById('filter-shop').value||'all';
  return shop==='all' ? 'ทุกร้าน' : shop;
}

  const w = window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>รายงานฝากขาย — ${esc(reportTitle())}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
  @page{size:A4 landscape;margin:9mm}
  body{font-family:'Sarabun',sans-serif;font-size:10.5px;color:#1A1A1A;margin:0;padding:14px}
  h1{font-size:16px;color:#8A6D2F;margin:0 0 2px}
  .sub{font-size:11px;color:#666;margin-bottom:10px}
  table{width:100%;border-collapse:collapse}
  th{background:#FBF7EE;color:#8A6D2F;font-size:8.5px;text-transform:uppercase;padding:4px 5px;border:1px solid #d8c894;text-align:left}
  td{padding:3px 5px;border:1px solid #ddd;vertical-align:middle}

  .btn{position:fixed;top:10px;right:12px;padding:8px 18px;background:#C9A84C;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit}
  @media print{.btn{display:none}}
  </style></head><body>
  <button class="btn" onclick="window.print()">🖨 พิมพ์ / บันทึก PDF</button>
  <h1>💎 JS Jewelry — รายงานสินค้าฝากขาย</h1>
  <div class="sub">ร้านปลายทาง: <b>${esc(reportTitle())}</b> · ${items.length} รายการ · ${items.reduce((a,x)=>a+x.qty,0)} ชิ้น · ออกรายงาน ${esc(nowTH())}</div>
  <table><tr>${REPORT_COLS.map(c=>`<th>${c}</th>`).join('')}</tr>
  ${items.map(x=>{ const p=x.p;
    return `<tr>
    <td><b>${esc(x.sku)}</b></td>
    <td>${p.imageUrl?`<img src="${esc(imgSrc(p.imageUrl))}" onerror="this.style.display='none'">`:''}</td>
    <td>${esc(p.name||'')}</td><td>${esc(p.category||'')}</td><td>${esc(p.material||'')}</td>
    <td class="r">${esc(p.weight||'')}</td><td>${esc(p.gemType||'')}</td><td class="r">${esc(p.gemWeight||'')}</td>
    <td class="r">${fmtN(p.sellPrice||'')}</td><td class="r">${p.promoPrice?fmtN(p.promoPrice):''}</td>
    <td>${esc(p.notes||'')}</td><td class="r"><b>${x.qty}</b></td><td>${esc(x.shop)}</td><td>${esc(x.date)}</td><td>${esc(p.status||'')}</td>
  </tr>`; }).join('')}
  </table></body></html>`);
  w.document.close();
}

async function exportExcel(){
  const items = reportItems();
  if(!items.length){ toast('ไม่มีรายการให้ออกรายงาน','err'); return; }
  toast(`กำลังสร้าง Excel + ดึงรูป ${items.length} รายการ…`);
  try{
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('ฝากขาย');
    ws.columns = [
      {header:'sku',width:12},{header:'picture',width:13},{header:'name',width:34},{header:'category',width:11},
      {header:'material',width:13},{header:'weight',width:8},{header:'gemType',width:14},{header:'gemWeight',width:11},
      {header:'sellPrice',width:11},{header:'promotionPrice',width:14},{header:'notes',width:30},
      {header:'qtyConsigned',width:12},{header:'shop',width:16},{header:'dateOut',width:12},{header:'status',width:11}
    ];
    ws.getRow(1).font = {bold:true};
    ws.getRow(1).fill = {type:'pattern',pattern:'solid',fgColor:{argb:'FFFBF7EE'}};
    items.forEach(x=>{ const p=x.p;
      ws.addRow([x.sku,'',p.name||'',p.category||'',p.material||'',p.weight||'',p.gemType||'',p.gemWeight||'',
        p.sellPrice||'',p.promoPrice||'',p.notes||'',x.qty,x.shop,x.date,p.status||'']);
    });
    for(let i=0;i<items.length;i++){
      const rowN = i+2;
      ws.getRow(rowN).height = 64;
      ws.getRow(rowN).alignment = {vertical:'middle',wrapText:true};
      const id = getImgId(items[i].p.imageUrl);
      if(!id) continue;
      try{
        const r = await fetch(CONFIG.IMG_PROXY+id);
        if(!r.ok) continue;
        const buf = await r.arrayBuffer();
        const imgId = wb.addImage({buffer:buf, extension:'jpeg'});
        ws.addImage(imgId, {tl:{col:1.08,row:rowN-0.97}, ext:{width:80,height:80}, editAs:'oneCell'});
      }catch(e){ console.warn('img fail', items[i].sku, e); }
    }
    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const shop = reportTitle()==='ทุกร้าน'?'all':reportTitle();
    a.download = `consignment_${shop}_${new Date().toISOString().slice(0,10)}.xlsx`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('✅ ดาวน์โหลด Excel เรียบร้อย','ok');
  }catch(e){ console.error(e); toast('สร้าง Excel ไม่สำเร็จ: '+(e.message||e),'err'); }
}
